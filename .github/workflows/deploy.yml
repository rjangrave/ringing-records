name: Deploy Ringing Records

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create config.js from secrets
        run: |
          echo "const SUPA_URL  = '${{ secrets.SUPA_URL }}';" > config.js
          echo "const SUPA_KEY  = '${{ secrets.SUPA_KEY }}';" >> config.js
          echo "const EDGE_URL  = '${{ secrets.EDGE_URL }}';" >> config.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.gitignore,.github'
