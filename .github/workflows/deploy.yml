name: Deploy Ringing Records

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create config.js from secrets
        run: |
          echo "const SUPA_URL  = '${{ secrets.SUPA_URL }}';" > config.js
          echo "const SUPA_KEY  = '${{ secrets.SUPA_KEY }}';" >> config.js
          echo "const EDGE_URL  = '${{ secrets.EDGE_URL }}';" >> config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
